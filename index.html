<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MRCOG-1 Flashcards</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --text:#e2e8f0; --muted:#94a3b8;
    --accent:#38bdf8; --accent2:#0ea5e9; --ai:#f59e0b; --ai-bg:#3b2f12; --line:#334155;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--text);line-height:1.5}
  header{padding:18px 16px 8px;text-align:center}
  h1{font-size:1.25rem;margin:0 0 4px}
  .sub{color:var(--muted);font-size:.85rem}
  .wrap{max-width:760px;margin:0 auto;padding:14px 12px 60px}

  /* ---- Home / section picker ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:18px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;
        cursor:pointer;transition:border-color .15s,transform .05s;text-align:left}
  .tile:hover{border-color:var(--accent2)}
  .tile:active{transform:scale(.99)}
  .tile h2{font-size:1.05rem;margin:0 0 6px}
  .tile .stat{color:var(--muted);font-size:.82rem}
  .tile .ai{color:var(--ai)}
  .home-note{color:var(--muted);font-size:.8rem;text-align:center;margin-top:26px}

  /* ---- Section view ---- */
  #sectionView{display:none}
  .topbar{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--line)}
  .topbar .row1{display:flex;align-items:center;gap:10px;padding:10px 12px 4px}
  .back{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
        padding:7px 12px;cursor:pointer;color:var(--text);font:inherit;white-space:nowrap}
  .secTitle{font-weight:600}
  .controls{padding:8px 12px 10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  input,select,button{font:inherit;color:var(--text);background:var(--panel2);
        border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  input[type=search]{flex:1 1 220px;min-width:0}
  button{cursor:pointer}
  button.active{background:var(--accent2);border-color:var(--accent2);color:#04212e;font-weight:600}
  .count{color:var(--muted);font-size:.82rem;text-align:center;margin:6px 0 12px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
        padding:14px 16px;margin:10px 0;cursor:pointer}
  .card .meta{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .card .q{font-weight:600}
  .card .a{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);color:#cbd5e1;display:none}
  .card.open .a{display:block}
  .card .hint{color:var(--muted);font-size:.75rem;margin-top:8px}
  .card.open .hint{display:none}
  .badge{display:inline-block;background:var(--ai-bg);color:var(--ai);border:1px solid var(--ai);
         border-radius:999px;font-size:.68rem;padding:2px 8px;margin-left:8px;font-weight:600}
  .note{margin-top:10px;background:var(--ai-bg);border:1px solid var(--ai);border-radius:10px;
        padding:8px 10px;font-size:.82rem;color:#fcd9a0}
  .note b{color:var(--ai)}

  .study{display:none}
  .study.on{display:block}
  .list.off{display:none}
  .flash{background:var(--panel);border:1px solid var(--line);border-radius:16px;min-height:240px;
         padding:22px;display:flex;flex-direction:column;justify-content:center;text-align:center;cursor:pointer;margin:8px 0}
  .flash .meta{font-size:.72rem;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
  .flash .body{font-size:1.08rem}
  .flash .lbl{color:var(--accent);font-size:.72rem;letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase}
  .nav{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:12px}
  .nav .pos{color:var(--muted);font-size:.85rem;min-width:90px;text-align:center}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <header>
    <h1>MRCOG-1 Flashcards</h1>
    <div class="sub" id="homeSub">Choose a subject</div>
  </header>
  <div class="wrap">
    <div class="grid" id="grid"></div>
    <div class="home-note">More subjects will appear here as they're added.</div>
  </div>
</div>

<!-- SECTION -->
<div id="sectionView">
  <div class="topbar">
    <div class="row1">
      <button class="back" id="back">‹ Subjects</button>
      <span class="secTitle" id="secTitle"></span>
    </div>
    <div class="controls">
      <input type="search" id="q" placeholder="Search…" autocomplete="off">
      <select id="topic"></select>
      <select id="filter">
        <option value="all">All cards</option>
        <option value="verified">Verified only</option>
        <option value="ai">⚠ AI-flagged only</option>
      </select>
      <button id="mBrowse" class="active">Browse</button>
      <button id="mStudy">Study</button>
    </div>
  </div>
  <div class="wrap">
    <div class="count" id="count"></div>
    <div class="list" id="list"></div>
    <div class="study" id="study">
      <div class="flash" id="flash"><div class="body">…</div></div>
      <div class="nav">
        <button id="prev">‹ Prev</button>
        <span class="pos" id="pos"></span>
        <button id="next">Next ›</button>
        <button id="shuffle">⤮ Shuffle</button>
      </div>
    </div>
  </div>
</div>

<script src="cards.js"></script>
<script>
(function(){
  const SECTIONS = window.SECTIONS || [];
  const $ = s => document.querySelector(s);
  const esc = s => { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; };
  const badge = c => c.ai ? '<span class="badge">⚠ AI · verify</span>' : '';

  let section=null, mode='browse', studyList=[], studyIdx=0, flipped=false;

  /* ---------- Home ---------- */
  function renderHome(){
    const total = SECTIONS.reduce((n,s)=>n+s.cards.length,0);
    $('#homeSub').textContent = SECTIONS.length
      ? `${SECTIONS.length} subject${SECTIONS.length>1?'s':''} · ${total} cards`
      : 'No subjects yet';
    $('#grid').innerHTML = SECTIONS.map((s,i)=>{
      const ai = s.cards.filter(c=>c.ai).length;
      return `<div class="tile" data-i="${i}">
        <h2>${esc(s.title)}</h2>
        <div class="stat">${s.cards.length} cards${ai?` · <span class="ai">${ai} ⚠ AI</span>`:''}</div>
      </div>`;
    }).join('');
    $('#grid').querySelectorAll('.tile').forEach(el=>
      el.addEventListener('click',()=>openSection(SECTIONS[+el.dataset.i])));
  }

  function showHome(){
    section=null; location.hash='';
    $('#sectionView').style.display='none';
    $('#home').style.display='';
    window.scrollTo(0,0);
  }

  /* ---------- Section ---------- */
  function openSection(sec){
    section=sec; location.hash=sec.id;
    $('#home').style.display='none';
    $('#sectionView').style.display='';
    $('#secTitle').textContent=sec.title;
    const topics=[...new Set(sec.cards.map(c=>c.topic))];
    $('#topic').innerHTML='<option value="all">All topics</option>'+
      topics.map(t=>`<option value="${t.replace(/"/g,'&quot;')}">${esc(t)}</option>`).join('');
    $('#q').value=''; $('#filter').value='all';
    setMode('browse'); window.scrollTo(0,0);
  }

  function filtered(){
    const q=$('#q').value.trim().toLowerCase(), topic=$('#topic').value, f=$('#filter').value;
    return section.cards.filter(c=>{
      if(topic!=='all'&&c.topic!==topic) return false;
      if(f==='verified'&&c.ai) return false;
      if(f==='ai'&&!c.ai) return false;
      if(q&&!(c.q.toLowerCase().includes(q)||c.a.toLowerCase().includes(q)||(c.subtopic||'').toLowerCase().includes(q))) return false;
      return true;
    });
  }

  function renderList(){
    const items=filtered();
    $('#count').textContent=`${items.length} card${items.length===1?'':'s'}`;
    const list=$('#list');
    if(!items.length){ list.innerHTML='<div class="empty">No cards match.</div>'; return; }
    list.innerHTML=items.map(c=>`
      <div class="card">
        <div class="meta">${esc(c.topic)}${c.subtopic?' · '+esc(c.subtopic):''} ${badge(c)}</div>
        <div class="q">${esc(c.q)}</div>
        <div class="hint">Tap to reveal answer</div>
        <div class="a">${esc(c.a)}${c.ai&&c.note?`<div class="note"><b>⚠ AI note:</b> ${esc(c.note)}</div>`:''}</div>
      </div>`).join('');
    list.querySelectorAll('.card').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('open')));
  }

  function renderStudy(){ studyList=filtered(); if(studyIdx>=studyList.length)studyIdx=0; flipped=false;
    $('#count').textContent=`${studyList.length} card${studyList.length===1?'':'s'} in this set`; showFlash(); }
  function showFlash(){
    const f=$('#flash');
    if(!studyList.length){ f.innerHTML='<div class="body">No cards match.</div>'; $('#pos').textContent=''; return; }
    const c=studyList[studyIdx];
    f.innerHTML=`<div class="meta">${esc(c.topic)}${c.subtopic?' · '+esc(c.subtopic):''} ${badge(c)}</div>`+
      (flipped
        ? `<div class="lbl">Answer</div><div class="body">${esc(c.a)}${c.ai&&c.note?`<div class="note"><b>⚠ AI note:</b> ${esc(c.note)}</div>`:''}</div>`
        : `<div class="lbl">Question</div><div class="body">${esc(c.q)}</div><div class="hint" style="margin-top:14px;color:var(--muted)">Tap to flip</div>`);
    $('#pos').textContent=`${studyIdx+1} / ${studyList.length}`;
  }
  function move(d){ if(!studyList.length)return; studyIdx=(studyIdx+d+studyList.length)%studyList.length; flipped=false; showFlash(); }

  function setMode(m){
    mode=m;
    $('#mBrowse').classList.toggle('active',m==='browse');
    $('#mStudy').classList.toggle('active',m==='study');
    $('#list').classList.toggle('off',m!=='browse');
    $('#study').classList.toggle('on',m==='study');
    m==='browse'?renderList():renderStudy();
  }
  function refresh(){ if(section) (mode==='browse'?renderList():renderStudy()); }

  $('#back').addEventListener('click',showHome);
  $('#q').addEventListener('input',refresh);
  $('#topic').addEventListener('change',refresh);
  $('#filter').addEventListener('change',refresh);
  $('#mBrowse').addEventListener('click',()=>setMode('browse'));
  $('#mStudy').addEventListener('click',()=>setMode('study'));
  $('#flash').addEventListener('click',()=>{flipped=!flipped;showFlash();});
  $('#prev').addEventListener('click',()=>move(-1));
  $('#next').addEventListener('click',()=>move(1));
  $('#shuffle').addEventListener('click',()=>{for(let i=studyList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[studyList[i],studyList[j]]=[studyList[j],studyList[i]];}studyIdx=0;flipped=false;showFlash();});
  document.addEventListener('keydown',e=>{ if(mode!=='study'||!section)return;
    if(e.key==='ArrowRight')move(1); else if(e.key==='ArrowLeft')move(-1);
    else if(e.key===' '){e.preventDefault();flipped=!flipped;showFlash();} });
  window.addEventListener('popstate',route);

  function route(){
    const id=location.hash.replace(/^#/,'');
    const sec=SECTIONS.find(s=>s.id===id);
    if(sec) openSection(sec); else showHome();
  }

  renderHome();
  route();  // deep-link support (e.g. #clinical-management)
})();
</script>
</body>
</html>
